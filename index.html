  <body>
    <div id="status-announcer" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>

    <div class="app">
      <aside id="sidebar" class="sidebar" aria-label="Volume conversion guide">
        <div class="sidebar-header">
          <h2 class="sidebar-title">Volume Guide</h2>
          <button
            id="sidebar-close"
            class="sidebar-close"
            type="button"
            aria-label="Close volume guide"
          >
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <p class="sidebar-intro">
          Each tile value is a fluid-ounce count. The label on the tile is the
          kitchen equivalent. Merge matching tiles to double the volume.
        </p>
        <div class="conversion-legend" aria-hidden="true">
          <span class="conversion-legend-spacer"></span>
          <span>Tile</span>
          <span>fl oz</span>
        </div>
        <ol id="conversion-list" class="conversion-list"></ol>
      </aside>

      <div id="sidebar-backdrop" class="sidebar-backdrop" hidden></div>

      <div class="app-main">
        <button
          id="sidebar-open"
          class="sidebar-open"
          type="button"
          aria-expanded="false"
          aria-controls="sidebar"
        >
          <span class="sidebar-open-icon" aria-hidden="true"></span>
          <span class="sidebar-open-label">Guide</span>
        </button>

        <div class="container">
          <header class="header">
            <div class="title-group">
              <h1>16gallons</h1>
              <p class="subtitle">Merge volumes. Reach 16 gallons.</p>
            </div>
            <div class="header-tools">
              <button
                id="theme-toggle"
                class="theme-toggle"
                type="button"
                aria-label="Switch to dark theme"
                aria-pressed="false"
              >
                <span class="theme-toggle-icon" aria-hidden="true"></span>
              </button>
              <div class="scores">
                <div class="score-box">
                  <span class="score-label">Score</span>
                  <span id="score" class="score-value">0</span>
                </div>
                <div class="score-box">
                  <span class="score-label">Best</span>
                  <span id="best-score" class="score-value">0</span>
                </div>
              </div>
            </div>
          </header>

          <div class="controls">
            <div class="controls-primary">
              <div
                class="difficulty-toggle"
                role="radiogroup"
                aria-label="Board difficulty"
              >
                <button
                  id="difficulty-hard"
                  type="button"
                  role="radio"
                  aria-checked="true"
                  aria-label="Hard, 4 by 4 board"
                >
                  Hard
                </button>
                <button
                  id="difficulty-easy"
                  type="button"
                  role="radio"
                  aria-checked="false"
                  aria-label="Easy, 5 by 5 board"
                >
                  Easy
                </button>
              </div>
              <div class="controls-actions">
                <button id="new-game" type="button">New Game</button>
                <button id="undo" type="button" disabled>Undo</button>
              </div>
            </div>
            <p class="hint">Arrow keys, WASD, or swipe to move.</p>
          </div>

          <div class="board-wrapper">
            <div id="board" class="board" aria-label="Game board"></div>
            <div id="overlay" class="overlay hidden" aria-hidden="true">
              <div class="overlay-content">
                <p id="overlay-message"></p>
                <button id="overlay-action" type="button"></button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="game.js"></script>
